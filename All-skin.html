<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Schwans ML - All Skin Series</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f4f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.25s ease;
    }

    body.dark-mode {
      background: linear-gradient(145deg, #121826 0%, #0f141f 100%);
    }
    body.dark-mode .site-header {
      background: rgba(18, 24, 32, 0.96);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    body.dark-mode .brand-name {
      background: linear-gradient(125deg, #b9d0f0, #8ab3e6, #6c9fd1);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    body.dark-mode .search-input-modern {
      background: #1e2538;
      border-color: #2d3648;
      color: #eef2ff;
    }
    body.dark-mode .icon-btn {
      color: #cfdef5;
      background: rgba(255, 255, 255, 0.05);
    }
    body.dark-mode .hero-card {
      background: rgba(25, 32, 45, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    body.dark-mode .side-drawer {
      background: #1a1f2e;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }
    body.dark-mode .site-footer {
      background: rgba(18, 24, 32, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    body.dark-mode .footer-text {
      color: #8f9eb2;
    }
    body.dark-mode .footer-link {
      color: #a0b5d0;
    }
    body.dark-mode .footer-link:hover {
      color: #c9ddf5;
    }
    body.dark-mode .skin-series-btn {
      background: #1e2a3a;
      border-color: #334155;
      color: #e2e8f0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    body.dark-mode .skin-series-btn:hover {
      background: #2d3a4e;
      border-color: #54708f;
      color: white;
    }
    body.dark-mode .section-header {
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }
    /* Active menu item highlight */
    .drawer-menu li.active-menu {
      background: #eef2fe;
      color: #1e3a8a;
      font-weight: 700;
      border-left: 3px solid #3b71ca;
      transform: translateX(2px);
    }
    body.dark-mode .drawer-menu li.active-menu {
      background: #2d3a5c;
      color: #b9d0ff;
      border-left-color: #6c9fd1;
    }
    .drawer-menu li.active-menu i {
      color: #3b71ca;
    }
    body.dark-mode .drawer-menu li.active-menu i {
      color: #9abae0;
    }

    /* HEADER */
    .site-header {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    .header-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand-name {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(125deg, #1e2f4b, #2c3e66, #1b4a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      white-space: nowrap;
      cursor: pointer;
    }
    .search-center-area {
      flex: 1;
      display: flex;
      justify-content: center;
      max-width: 320px;
    }
    .search-slide-center {
      width: 0%;
      opacity: 0;
      overflow: hidden;
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s ease;
      position: relative;
    }
    .search-slide-center.open {
      width: 100%;
      opacity: 1;
    }
    .search-input-modern {
      width: 100%;
      padding: 0.55rem 1rem 0.55rem 2.3rem;
      border: 1px solid #d0ddee;
      border-radius: 60px;
      font-size: 0.8rem;
      outline: none;
      background: white;
    }
    .search-input-modern:focus {
      border-color: #3b71ca;
      box-shadow: 0 0 0 3px rgba(59, 113, 202, 0.12);
    }
    .search-icon-inside {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: #8ca0b5;
      pointer-events: none;
    }
    .right-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: all 0.2s ease;
      color: #1f2e45;
      background: rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: rgba(0, 0, 0, 0.08);
      transform: scale(0.96);
    }

    /* DRAWER */
    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2), opacity 0.35s ease;
      z-index: 200;
    }
    .menu-overlay.active {
      visibility: visible;
      opacity: 1;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
    }
    .side-drawer {
      position: fixed;
      top: 0;
      right: -300px;
      width: 280px;
      max-width: 80vw;
      height: 100%;
      background: #ffffff;
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.15);
      transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1.05);
      z-index: 210;
      padding: 1.8rem 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .side-drawer.open {
      right: 0;
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eaf0f6;
      padding-bottom: 0.8rem;
    }
    .drawer-header h3 {
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #1E2F4B, #2c3e66);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .close-drawer {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #5a6e84;
      transition: transform 0.25s ease;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-drawer:hover {
      transform: rotate(90deg) scale(1.02);
      color: #d9534f;
    }
    .drawer-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .drawer-menu li {
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.6rem 0.7rem;
      border-radius: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #1f2e46;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .drawer-menu li i {
      width: 24px;
      font-size: 1rem;
      color: #3b71ca;
    }
    .drawer-menu li:hover {
      background: #f0f4fe;
      transform: translateX(5px);
    }
    .theme-switch-item {
      display: flex;
      align-items: center;
    }
    .logo-switch {
      position: relative;
      display: inline-block;
      width: 58px;
      height: 28px;
    }
    .logo-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider-logo {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border-radius: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
    }
    .slider-logo:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    input:checked + .slider-logo:before {
      transform: translateX(30px);
    }
    input:checked + .slider-logo {
      background-color: #3b71ca;
    }
    .slider-logo i {
      font-size: 11px;
      z-index: 1;
    }
    .slider-logo .fa-sun { color: #f59e0b; }
    .slider-logo .fa-moon { color: #e2e8f0; }
    body.dark-mode .slider-logo { background-color: #475569; }
    body.dark-mode input:checked + .slider-logo { background-color: #5a8fdc; }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      max-width: 100%;
      margin: 2rem auto;
      padding: 0 1rem;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    
    .hero-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
      padding-bottom: 0.6rem;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(120deg, #1e2f4b, #2c5270);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    body.dark-mode .section-title {
      background: linear-gradient(120deg, #c9ddf5, #9abae0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* grid tombol skin series */
    .skin-series-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 0.5rem;
      justify-content: flex-start;
    }
    .skin-series-btn {
      background: white;
      border: 1px solid #dce5f0;
      padding: 0.6rem 1.3rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      color: #1f3a5f;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      letter-spacing: -0.2px;
    }
    .skin-series-btn i {
      font-size: 0.8rem;
      color: #5f7f9e;
      transition: transform 0.2s;
    }
    .skin-series-btn:hover {
      background: #eef3fc;
      border-color: #b8cee8;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.12);
    }
    .skin-series-btn:hover i {
      transform: translateX(2px);
      color: #3b71ca;
    }
    .skin-series-btn:active {
      transform: translateY(1px);
    }
    /* kategori abjad */
    .series-category {
      margin-bottom: 1.5rem;
    }
    .category-head {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
      margin-top: 0.2rem;
      color: #2c3e66;
      display: inline-block;
      border-left: 4px solid #5f8bc9;
      padding-left: 12px;
    }
    body.dark-mode .category-head {
      color: #c9ddf5;
      border-left-color: #6c9fd1;
    }
    .empty-helper {
      color: #7e8b9f;
      font-size: 0.8rem;
      font-style: italic;
      text-align: center;
      padding: 1.5rem;
    }

    /* Toast notification */
    .collector-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      background: #1f2e46;
      color: white;
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
      background: rgba(30, 47, 70, 0.95);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0s linear 0.2s, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255,255,240,0.2);
    }
    .collector-toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0s linear 0s;
    }
    body.dark-mode .collector-toast {
      background: rgba(20, 28, 40, 0.96);
      border-color: #3a4c6e;
    }

    /* FOOTER */
    .site-footer {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      margin-top: 2rem;
      padding: 1.5rem 1rem;
    }
    .footer-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }
    .footer-social {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 0.25rem;
    }
    .footer-social a {
      color: #5a6e84;
      font-size: 1.2rem;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.03);
      text-decoration: none;
    }
    .footer-social a:hover {
      color: #3b71ca;
      transform: translateY(-3px);
      background: rgba(59, 113, 202, 0.1);
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      color: #6c7a91;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .footer-link:hover {
      color: #3b71ca;
    }
    .footer-text {
      color: #8f9eb2;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .footer-heart {
      color: #e53e3e;
      display: inline-block;
      animation: heartbeat 1.5s ease infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @media (max-width: 620px) {
      .brand-name { font-size: 1.1rem; white-space: normal; }
      .hero-card { padding: 1rem; }
      .section-title { font-size: 1.2rem; }
      .skin-series-btn { padding: 0.45rem 0.9rem; font-size: 0.7rem; }
      .category-head { font-size: 1rem; }
      .collector-toast { white-space: normal; width: 85%; justify-content: center; text-align: center; }
      .footer-social a {
        width: 32px;
        height: 32px;
        font-size: 1rem;
      }
      .footer-links {
        gap: 1rem;
      }
      .footer-link {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-container">
    <div class="brand" id="brandLogo">
      <span class="brand-name">Schwans ML</span>
    </div>
    <div class="search-center-area">
      <div class="search-slide-center" id="searchSlideCenter">
        <i class="fas fa-search search-icon-inside"></i>
        <input type="text" class="search-input-modern" id="searchInputModern" placeholder="Cari series skin...">
      </div>
    </div>
    <div class="right-actions">
      <button class="icon-btn" id="searchToggleBtnCenter"><i class="fas fa-search"></i></button>
      <button class="icon-btn hamburger-btn" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="side-drawer" id="sideDrawer">
  <div class="drawer-header"><h3>Menu</h3><button class="close-drawer" id="closeDrawerBtn">&times;</button></div>
  <div class="theme-switch-item">
    <label class="logo-switch"><input type="checkbox" id="themeToggleSwitch"><span class="slider-logo"><i class="fas fa-sun"></i><i class="fas fa-moon"></i></span></label>
  </div>
  <ul class="drawer-menu">
    <li id="menuHome"><i class="fas fa-home"></i> Beranda</li>
    <li id="menuAllSkin"><i class="fas fa-layer-group"></i> All Skin</li>
    <li id="menuSupportAdmin"><i class="fas fa-headset"></i> Support Admin</li>
  </ul>
  <div style="margin-top: auto; font-size: 0.6rem; color: #8f9eb2; text-align: center;">© Schwans ML 2025</div>
</div>

<main class="main-content">
  <div class="hero-card">
    <div class="section-header">
      <span class="section-title"><i class="fas fa-layer-group" style="margin-right: 8px;"></i> All Skin Series</span>
      <span id="searchResultBadge" style="font-size: 0.7rem; opacity: 0.7;"></span>
    </div>
    <div id="skinSeriesContainer" class="skin-series-grid"></div>
    <div id="emptySearchMessage" class="empty-helper" style="display: none;">
      <i class="fas fa-search-minus"></i> Tidak ada series yang cocok
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-social">
      <a href="https://t.me/schwanzml" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
        <i class="fab fa-telegram-plane"></i>
      </a>
    </div>
    <div class="footer-links">
      <a href="#" class="footer-link">Tentang Kami</a>
      <a href="#" class="footer-link">Kebijakan Privasi</a>
      <a href="#" class="footer-link">Syarat & Ketentuan</a>
      <a href="#" class="footer-link">Bantuan</a>
    </div>
    <div class="footer-text">
      © 2026 Schwans ML • Built with for Mobile Legends Community
    </div>
  </div>
</footer>

<div id="collectorToast" class="collector-toast"><i class="fas fa-gem" style="color:#ffd966;"></i> <span id="toastMessage">✨ Koleksi skin series dipilih ✨</span></div>

<script>
  (function() {
    // data skin series sesuai daftar abjad yang diminta
    const skinData = {
      A: ["Abyss", "All Star", "Annual Starlight", "Anime Collab", "Aspirant"],
      B: ["Blazing"],
      C: ["Champion", "Christmas", "Collector"],
      D: ["Dawning Star"],
      E: ["Elite", "Epic", "Exorcist"],
      H: ["Halloween"],
      K: ["Kof"],
      L: ["Legend", "Lunarfest", "Lightborn"],
      M: ["M-Series"],
      P: ["Prime"],
      S: ["Special", "Starlight"],
      V: ["Valentines"],
      Z: ["Zodiac"]
    };

    const container = document.getElementById('skinSeriesContainer');
    const emptyMsg = document.getElementById('emptySearchMessage');
    const searchInput = document.getElementById('searchInputModern');
    const toastEl = document.getElementById('collectorToast');
    const toastTextSpan = document.getElementById('toastMessage');
    const menuAllSkin = document.getElementById('menuAllSkin');
    const menuHome = document.getElementById('menuHome');
    const menuSupportAdmin = document.getElementById('menuSupportAdmin');
    const brandLogo = document.getElementById('brandLogo');
    const searchResultBadge = document.getElementById('searchResultBadge');
    
    // Fungsi untuk memberikan highlight aktif pada menu sidebar
    function setActiveMenu() {
      const allMenuItems = document.querySelectorAll('.drawer-menu li');
      allMenuItems.forEach(item => item.classList.remove('active-menu'));
      if (menuAllSkin) menuAllSkin.classList.add('active-menu');
    }

    function showToast(seriesName) {
      toastTextSpan.innerText = `✨ Menampilkan koleksi ${seriesName} ✨`;
      toastEl.classList.add('show');
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, 2000);
    }

    // Fungsi untuk mendapatkan ikon berdasarkan nama series
    function getSeriesIcon(seriesName) {
      const name = seriesName.toLowerCase();
      if (name.includes('collector')) return 'fa-crown';
      if (name.includes('legend')) return 'fa-star';
      if (name.includes('epic')) return 'fa-gem';
      if (name.includes('zodiac')) return 'fa-moon';
      if (name.includes('starlight')) return 'fa-lightbulb';
      if (name.includes('blazing')) return 'fa-fire';
      if (name.includes('abyss')) return 'fa-water';
      if (name.includes('anime')) return 'fa-film';
      if (name.includes('aspirant')) return 'fa-star-of-life';
      if (name.includes('exorcist')) return 'fa-ghost';
      if (name.includes('valentines')) return 'fa-heart';
      if (name.includes('halloween')) return 'fa-pumpkin';
      if (name.includes('christmas')) return 'fa-gift';
      if (name.includes('champion')) return 'fa-trophy';
      if (name.includes('prime')) return 'fa-crown';
      return 'fa-layer-group';
    }

    function renderSeries(filterText = '') {
      const filterLower = filterText.trim().toLowerCase();
      let hasResults = false;
      let html = '';
      let totalResults = 0;

      const sortedKeys = Object.keys(skinData).sort();
      
      for (let i = 0; i < sortedKeys.length; i++) {
        const letter = sortedKeys[i];
        const seriesArray = skinData[letter];
        
        let filteredSeries = seriesArray;
        if (filterLower !== '') {
          filteredSeries = seriesArray.filter(s => s.toLowerCase().includes(filterLower));
        }
        
        if (filteredSeries.length === 0) continue;
        
        hasResults = true;
        totalResults += filteredSeries.length;
        
        html += `<div class="series-category"><div class="category-head">${letter}</div><div class="skin-series-grid" style="gap: 10px; margin-top: 6px;">`;
        
        filteredSeries.forEach(seriesName => {
          const icon = getSeriesIcon(seriesName);
          html += `<button class="skin-series-btn" data-series="${seriesName}"><i class="fas ${icon}"></i> ${seriesName}</button>`;
        });
        
        html += `</div></div>`;
      }

      // Update badge pencarian
      if (filterLower !== '') {
        if (hasResults) {
          searchResultBadge.innerHTML = `<i class="fas fa-search"></i> ${totalResults} series ditemukan`;
          searchResultBadge.style.opacity = '1';
        } else {
          searchResultBadge.innerHTML = '';
        }
      } else {
        searchResultBadge.innerHTML = '';
      }

      if (!hasResults) {
        container.style.display = 'none';
        emptyMsg.style.display = 'block';
      } else {
        container.style.display = 'flex';
        container.innerHTML = html;
        emptyMsg.style.display = 'none';

        // Tambahkan event listener ke semua tombol skin series
        document.querySelectorAll('.skin-series-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const series = btn.getAttribute('data-series');
            if (series) {
              showToast(series);
              // Efek animasi klik
              btn.style.transform = 'scale(0.96)';
              setTimeout(() => { btn.style.transform = ''; }, 120);
            }
          });
        });
      }
    }

    // Event pencarian dengan debounce
    let debounceTimer;
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const searchTerm = e.target.value;
          renderSeries(searchTerm);
        }, 200);
      });
    }

    // Render awal
    renderSeries('');

    // --- Drawer, theme, toggle search, navigation dengan active menu highlight ---
    const searchSlide = document.getElementById('searchSlideCenter');
    const searchBtn = document.getElementById('searchToggleBtnCenter');
    const menuBtn = document.getElementById('menuToggleBtn');
    const drawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('menuOverlay');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const themeSwitch = document.getElementById('themeToggleSwitch');
    
    let searchOpen = false;
    function toggleSearch(force) {
      searchOpen = force !== undefined ? force : !searchOpen;
      if (searchOpen) {
        searchSlide.classList.add('open');
        setTimeout(() => searchInput?.focus(), 160);
      } else {
        searchSlide.classList.remove('open');
        if (searchInput) {
          searchInput.value = '';
          renderSeries('');
        }
      }
    }
    
    if (searchBtn) {
      searchBtn.addEventListener('click', (e) => { 
        e.stopPropagation(); 
        toggleSearch(); 
      });
    }
    
    function openDrawer() { 
      drawer.classList.add('open'); 
      overlay.classList.add('active'); 
    }
    
    function closeDrawer() { 
      drawer.classList.remove('open'); 
      overlay.classList.remove('active'); 
    }
    
    if (menuBtn) menuBtn.addEventListener('click', openDrawer);
    if (overlay) overlay.addEventListener('click', closeDrawer);
    if (closeDrawerBtn) closeDrawerBtn.addEventListener('click', closeDrawer);

    // Theme toggle
    const loadTheme = () => {
      const saved = localStorage.getItem('schwans-theme');
      if (saved === 'dark') { 
        document.body.classList.add('dark-mode'); 
        if (themeSwitch) themeSwitch.checked = true; 
      }
      else { 
        document.body.classList.remove('dark-mode'); 
        if (themeSwitch) themeSwitch.checked = false; 
      }
    };
    
    if (themeSwitch) {
      themeSwitch.addEventListener('change', (e) => {
        if (e.target.checked) { 
          document.body.classList.add('dark-mode'); 
          localStorage.setItem('schwans-theme', 'dark'); 
        }
        else { 
          document.body.classList.remove('dark-mode'); 
          localStorage.setItem('schwans-theme', 'light'); 
        }
      });
    }
    loadTheme();

    // Navigasi
    function goToHomePage() {
      window.location.href = 'index.html';
    }

    function goToSupportPage() {
      window.location.href = 'support.html';
    }

    if (menuHome) {
      menuHome.addEventListener('click', goToHomePage);
    }
    
    if (menuAllSkin) {
      menuAllSkin.addEventListener('click', () => {
        setActiveMenu();
        closeDrawer();
        // Reset pencarian jika perlu
        if (searchInput && searchInput.value !== '') {
          searchInput.value = '';
          renderSeries('');
          if (searchSlide.classList.contains('open')) {
            toggleSearch(false);
          }
        }
      });
    }

    if (menuSupportAdmin) {
      menuSupportAdmin.addEventListener('click', goToSupportPage);
    }

    if (brandLogo) {
      brandLogo.addEventListener('click', goToHomePage);
    }
    
    // Set highlight aktif untuk menu All Skin saat halaman dimuat
    setActiveMenu();
    
    // Close drawer saat klik ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDrawer();
        if (searchOpen) {
          toggleSearch(false);
        }
      }
    });
  })();
</script>
</body>
</html>
